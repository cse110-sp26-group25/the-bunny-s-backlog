<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Detective Terminal</title>
    <link rel="stylesheet" href="terminal_style.css">
</head>
<body>

    <div id="terminal-screen">
        <div id="bunny-dialogue"></div>
        <div id="output"></div>
        <input type="text" id="terminal-input" placeholder="Type command here..." autofocus>
    </div>

    <script type="module">
        import { runTutorialValidator } from './terminal_logic.js';

        const input = document.getElementById('terminal-input');
        const output = document.getElementById('output');
        const dialogue = document.getElementById('bunny-dialogue');

        dialogue.textContent = "Chief Inspector Bunny: 'Good morning, Detective. Calibrate the terminal to begin.'";

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const result = runTutorialValidator(input.value);
                output.innerHTML += `<p>> ${input.value}</p><p>${result}</p>`;
                input.value = '';
                
                // Keep output scrolled to the bottom
                output.scrollTop = output.scrollHeight;
            }
        });
    </script>
</body>
</html>
