<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <title>The Bunny's Backlog</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:wght@400;700&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/player.css" />
  </head>
  <body>
    <div id="app">
      <main class="lp">
        <section id="scene-vp" aria-label="Investigation scene">
          <div id="scene-bg" aria-hidden="true"></div>
          <div id="scene-vig" aria-hidden="true"></div>
          <div id="hud">
            <p id="phase-badge">
              PHASE <span id="ph-num">1</span> / <span id="ph-total">10</span>
            </p>
            <ul id="inv-bar" aria-label="Inventory"></ul>
          </div>
          <div id="tlog-wrap">
            <output id="tlog-scroll" role="log" aria-live="polite"></output>
            <button id="tlog-x">&#x2715; Return to Scene</button>
          </div>
          <button id="proceed-btn">&#x25B6; Continue</button>
        </section>
        <section id="term-area" aria-label="Command terminal">
          <div id="term-status" role="status">
            <span class="tstat">
              Words: <span class="v" id="ts-words">0/0</span>
            </span>
            <span class="tstat">
              Clues: <span class="v" id="ts-clues">0/0</span>
            </span>
            <button id="ts-rst" title="Restart">&#x21BA; Restart</button>
          </div>
          <div id="term-row">
            <span id="term-prompt">&gt;_</span>
            <input
              id="term-in"
              type="text"
              aria-label="Command input"
              autocomplete="off"
              autocorrect="off"
              autocapitalize="none"
              spellcheck="false"
              placeholder="type a command and press Enter&#x2026;"
            />
            <span id="term-kh">&#x21B5; Enter</span>
          </div>
        </section>
      </main>
      <aside id="sidebar">
        <header id="sb-head">
          <span class="nb-ic">&#x1F4D3;</span>
          <span class="nb-ti">Bunny&#x2019;s Notebook</span>
          <span class="nb-su">FIELD EDITION</span>
        </header>
        <div id="sb-tabs" role="tablist" aria-label="Notebook sections">
          <button
            class="sbt active"
            type="button"
            role="tab"
            id="tab-dialogue"
            aria-controls="panel-dialogue"
            aria-selected="true"
            data-tab="dialogue"
          >
            <span class="ti">&#x1F430;</span>Bunny
          </button>
          <button
            class="sbt"
            type="button"
            role="tab"
            id="tab-notes"
            aria-controls="panel-notes"
            aria-selected="false"
            data-tab="notes"
          >
            <span class="ti">&#x1F4CB;</span>Lizard&#x2019;s Notes
          </button>
          <button
            class="sbt"
            type="button"
            role="tab"
            id="tab-lessons"
            aria-controls="panel-lessons"
            aria-selected="false"
            data-tab="lessons"
          >
            <span class="ti">&#x1F4D6;</span>Bunny&#x2019;s Lessons
          </button>
        </div>
        <section
          class="sbp active"
          id="panel-dialogue"
          role="tabpanel"
          aria-labelledby="tab-dialogue"
        >
          <div id="dlg-panel"></div>
        </section>
        <section
          class="sbp"
          id="panel-notes"
          role="tabpanel"
          aria-labelledby="tab-notes"
        >
          <ul id="notes-list">
            <li class="empty">No notes yet.<br />Start investigating!</li>
          </ul>
        </section>
        <section
          class="sbp"
          id="panel-lessons"
          role="tabpanel"
          aria-labelledby="tab-lessons"
        >
          <ul id="lessons-list">
            <li class="empty">No lessons unlocked yet.</li>
          </ul>
        </section>
      </aside>
    </div>
    <div
      class="ovbg"
      id="win-bg"
      role="dialog"
      aria-modal="true"
      aria-labelledby="win-title"
    >
      <div class="ov-box">
        <div
          id="win-emojis"
          style="font-size: 2.2rem; margin-bottom: 8px"
        ></div>
        <h2 id="win-title">Level Complete!</h2>
        <p><em id="win-subtitle"></em></p>
        <div class="ov-final" id="win-message"></div>
        <p
          id="win-footnote"
          style="
            font-family: &quot;Courier Prime&quot;, monospace;
            font-size: 0.72rem;
            color: #888;
          "
        ></p>
        <button class="ovbtn" id="win-restart">&#x21BA; Play Again</button>
      </div>
    </div>
    <div id="toast" role="status" aria-live="polite"></div>

    <audio id="bgm-player" loop preload="auto" data-volume-type="music"></audio>

    <!-- Core Game Scripts -->
    <script src="../local_storage.js"></script>
    <script src="engine/storage.js"></script>
    <script src="components/hotspot.js"></script>
    <script src="engine/loader.js"></script>
    <script src="engine/game.js"></script>
    <script src="engine/ui.js"></script>
    <script src="engine/player.js"></script>
    <script src="main.js"></script>

    <!-- Runtime Audio Router and App Initialization Bootstrap -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const audioPlayer = document.getElementById("bgm-player");

        // 1. Get the current level from URL parameters (?level=level0, level1, level2)
        const urlParams = new URLSearchParams(window.location.search);
        const currentLevel = urlParams.get("level") || "level0";

        // 2. Updated Audio Map keys targeting the precise, newly refactored levels
        const bgmMapping = {
          level0: "../Sounds/Lv0BGM.mp3",
          level1: "../Sounds/Lv1BGM.mp3",
          level2: "../Sounds/Lv2BGM.mp3",
        };

        // Select track or fallback to level 0 background audio if query doesn't match
        const trackSrc = bgmMapping[currentLevel] || bgmMapping.level0;
        audioPlayer.src = trackSrc;
        if (typeof applyGlobalSettings === "function") {
          applyGlobalSettings(document);
        }

        // 3. Audio unlock mechanism triggered by mandatory user gesture interaction rules
        const startAudio = () => {
          audioPlayer
            .play()
            .then(() => {
              document.removeEventListener("click", startAudio);
              document.removeEventListener("keydown", startAudio);
            })
            .catch((error) => {
              console.log(
                "Playback blocked by browser audio contexts. Interacting with UI clears this.",
                error,
              );
            });
        };

        document.addEventListener("click", startAudio);
        document.addEventListener("keydown", startAudio);
      });

      /**
       * Safe, isolated entry point bootstrap executor loop.
       * Boots LevelPlayer object properties after asset dependencies compile.
       */
      (function startGame() {
        function start() {
          if (typeof LevelPlayer !== "undefined") {
            new LevelPlayer().init();
          } else {
            console.error(
              "Critical Runtime Fault: LevelPlayer script context is missing or uncompiled.",
            );
          }
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", start);
        } else {
          start();
        }
      })();
    </script>
    <script src="../scripts/buttonSound.js"></script>
  </body>
</html>
