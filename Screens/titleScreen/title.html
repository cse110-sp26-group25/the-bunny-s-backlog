<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Bunny</title>
    <link rel="stylesheet" href="titlestyle.css" />
  </head>
  <body>
    <audio
      src="../../Sounds/mainScreenBGM.mp3"
      autoplay
      loop
      data-volume-type="music"
    ></audio>
    <h1 class="main-title">The Bunny</h1>

    <!-- Creating the levels button -->
    <button class="level-button">Level selection</button>

    <!-- Creating the continue button -->
    <button class="continue-button">Continue game</button>

    <!-- Something button, currently not assigned -->
    <button class="something-button">WIP</button>

    <!-- Credits button -->
    <button class="credits-button">Credits</button>

    <!-- Settings button -->
    <button class="settings-button">Settings</button>

    <!-- Creating the bottom bar to hold meta information -->
    <footer class="bottom-bar">
      <span class="bar-left">V1.0</span>
      <span class="bar-right">KnowIdeas</span>
      <div class="bar-dot" title="Online"></div>
    </footer>

    <!-- JS script links -->
    <script src="../../local_storage.js"></script>
    <script src="../../scripts/buttonSound.js"></script>
    <script src="titleFunctions.js"></script>
  </body>
</html>
