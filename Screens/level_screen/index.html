<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levels</title>
    <link rel="stylesheet" href="style.css">
    <audio src="/the-bunny-s-backlog/Sounds/mainScreenBGM.mp3" autoplay loop></audio>
</head>
<body>

    <!-- Top Logo Section -->
    <div class="top-header">
        <div class="logo-placeholder">bunny-levels</div>
    </div>

    <div class="main-layout">
        <!-- Left Panel: Icon and Key/Summary -->
        <div class="left-panel">
            <div class="levels-icon">
                levels
            </div>
            <!-- This box gets updated dynamically by JavaScript -->
            <div class="summary-box" id="overview-box">
                <!-- Content injected via JS -->
            </div>
        </div>

        <!-- Right Panel: Horizontally Scrolling Cards -->
        <div class="cards-carousel" id="cards-carousel">
            <!-- Cards will be dynamically injected by JavaScript -->
        </div>
    </div>

    <!-- Shared save/progress helpers, then level select logic. -->
    <script src="../../local_storage.js"></script>
    <script src="script.js"></script>
</body>
</html>
